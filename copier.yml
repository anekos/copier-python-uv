project_name:
  type: str
  help: What is your project name?

package_name:
  type: str
  default: "{{ project_name.lower().replace(' ', '_').replace('-', '_') }}"

project_type:
  type: str
  help: プロジェクトの種類を選んでください
  choices:
    - local
    - lambda_sam
    - lambda_terraform

_tasks:
  - command: 'uv add --dev ruff mypy pytest pre-commit'
  - command: 'uv run pre-commit install'
  - command: 'uv add --dev cfn-lint aws-sam-cli'
    when: "{{ project_type == 'lambda_sam' }}"
  - command: 'git init .'
